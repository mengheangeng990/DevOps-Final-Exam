name: CI Build and Deploy

on:
  push:
    branches:
      - '*'

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Display Java and Maven versions
        run: |
          java -version
          mvn -v

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: Run tests
        run: mvn -B test

  deploy:
    name: Deploy via Ansible
    needs: build-test
    runs-on: ubuntu-latest
    if: ${{ needs.build-test.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] || [ -z "${{ secrets.ANSIBLE_HOST }}" ]; then
            echo "DEPLOY_ENABLED=false" >> $GITHUB_ENV
            echo "WARNING: Deploy secrets are missing. Skipping Ansible deployment."
            exit 0
          fi
          echo "DEPLOY_ENABLED=true" >> $GITHUB_ENV

      - name: Install Ansible
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Configure SSH for Ansible
        if: env.DEPLOY_ENABLED == 'true'
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add remote host to known_hosts
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        if: env.DEPLOY_ENABLED == 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: ansible-playbook -i inventory ansible-playbook.yml

  failure-email:
    name: Send Failure Email
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ needs.build-test.result == 'failure' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine recipient email
        run: |
          if [ -n "${{ github.event.head_commit.author.email }}" ]; then
            echo "TO_EMAIL=${{ github.event.head_commit.author.email }}" >> $GITHUB_ENV
          else
            echo "TO_EMAIL=srengty@gmail.com" >> $GITHUB_ENV
          fi

      - name: Validate SMTP secrets
        run: |
          if [ -z "${{ secrets.SMTP_SERVER }}" ] || [ -z "${{ secrets.SMTP_PORT }}" ] || [ -z "${{ secrets.SMTP_USERNAME }}" ] || [ -z "${{ secrets.SMTP_PASSWORD }}" ]; then
            echo "SEND_EMAIL=false" >> $GITHUB_ENV
            echo "WARNING: SMTP secrets are missing. Skipping failure email notification."
            exit 0
          fi
          echo "SEND_EMAIL=true" >> $GITHUB_ENV

      - name: Send build failure notification
        if: env.SEND_EMAIL == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GitHub Actions] Build Failed: ${{ github.repository }} #${{ github.run_number }}"
          to: ${{ env.TO_EMAIL }}
          cc: srengty@gmail.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Build failed for commit by ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.run_number }}
            URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs and fix the failure.
          content_type: text/plain
