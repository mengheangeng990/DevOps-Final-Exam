services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idcard_web
    ports:
      - "8443:8080"
      - "2222:22"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/B-ENG_Mengheang-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hello@123
      SERVER_PORT: 8081
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: idcard_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: B-ENG_Mengheang-db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: idcard_phpmyadmin
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      # Optionally use root or a managed user
      PMA_USER: root
      PMA_PASSWORD: Hello@123
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  mysql_data: {}
