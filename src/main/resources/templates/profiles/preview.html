<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>ID Card Preview</title>
    <style>
        .card { width: 420px; padding: 20px; border-radius: 16px; background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%); color: white; }
        .header { font-size: 1.2rem; margin-bottom: 16px; }
        .profile-photo { width: 120px; height: 120px; background: #ffffff22; border-radius: 12px; overflow: hidden; }
        .field { margin: 8px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="header" th:text="${template.organizationName}"></div>
    <div class="field"><strong>Name:</strong> <span th:text="${profile.fullName}"></span></div>
    <div class="field"><strong>Type:</strong> <span th:text="${profile.type}"></span></div>
    <div class="field"><strong>Reg No:</strong> <span th:text="${profile.registrationNumber}"></span></div>
    <div class="field"><strong>Department:</strong> <span th:text="${profile.department}"></span></div>
    <div class="field"><strong>Title:</strong> <span th:text="${profile.title}"></span></div>
    <div class="field"><strong>Expires:</strong> <span th:text="${profile.expiryDate}"></span></div>
    <div class="field"><img th:if="${profile.hasPhoto()}" th:src="@{/profiles/photo/{id}(id=${profile.id})}" alt="Photo" width="120" /></div>
</div>
</body>
</html>
