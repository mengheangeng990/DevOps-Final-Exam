apiVersion: v1
kind: Service
metadata:
  name: idcard-mysql
spec:
  selector:
    app: idcard-mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idcard-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idcard-mysql
  template:
    metadata:
      labels:
        app: idcard-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Hello@123"
            - name: MYSQL_DATABASE
              value: "B-ENG_Mengheang-db"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: idcard-web
spec:
  type: NodePort
  selector:
    app: idcard-web
  ports:
    - protocol: TCP
      port: 8443
      targetPort: 8080
      nodePort: 30080
    - protocol: TCP
      port: 2222
      targetPort: 22
      nodePort: 30222
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idcard-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idcard-web
  template:
    metadata:
      labels:
        app: idcard-web
    spec:
      containers:
        - name: web
          image: model-web:latest
          ports:
            - containerPort: 8080
            - containerPort: 22
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://idcard-mysql:3306/B-ENG_Mengheang-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Hello@123"
            - name: SERVER_PORT
              value: "8081"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 8080 default_server;
      listen [::]:8080 default_server;

      server_name _;

      location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
